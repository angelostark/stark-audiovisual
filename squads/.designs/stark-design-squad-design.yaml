  # ============================================================
  # SQUAD CONFIGURATION
  # ============================================================
  template: custom
  config_mode: extend

  infrastructure:
    data_files:
      - path: "data/brands/"
        description: "YAMLs de brand guidelines por cliente"
        created_by: brand-guardian

    spreadsheets:
      - name: "Métricas de Posts"
        description: "Planilha para analytics-posts com métricas de engajamento"
        columns: [post_id, client_name, post_date, post_type, likes, comments, shares, reach, saves, engagement_rate, qa_score, client_approved, performance_status, triple_validation]

    existing_scripts:
      - path: "automacoes/upload_drive.py"
        used_by: [orquestrador, designer-figma]
      - path: ".claude/commands/figma-export-para-drive.md"
        used_by: [orquestrador, designer-figma]
        mapped_to: "*exportar-entrega"

    external_skills:
      - name: UI-UX-Pro-Max
        install: "npx skills add nextlevelbuilder/ui-ux-pro-max-skill@ui-ux-pro-max"
        agents: [designer-figma, web-designer-lp, qa-qualidade]
      - name: frontend-design
        install: "npx skills add anthropics/skills@frontend-design"
        agents: [web-designer-lp, construtor-capa-reels]
      - name: shadcn-ui
        install: "npx skills add giuseppe-trisciuoglio/developer-kit@shadcn-ui"
        agents: [web-designer-lp]
      - name: web-accessibility
        install: "npx skills add supercent-io/skills-template@web-accessibility"
        agents: [web-designer-lp, qa-qualidade]
      - name: web-design-guidelines
        install: "npx skills add vercel-labs/agent-skills@web-design-guidelines"
        agents: [web-designer-lp, designer-figma, construtor-capa-reels]

  quality_rules:
    source: "Design System Stark — Regras Criativos (ClickUp)"
    delivery:
      resolution_feed: "1080x1080px"
      resolution_stories: "1080x1920px"
      export_static: PNG
      export_photo: JPG
      rejected_versions: "Arquivar, nunca deletar"
    process:
      no_task_without_briefing: true
      delivery_deadline_hours: 48
      qa_review_deadline_hours: 24
      fix_after_qa_hours: 12
      copy_rejection_threshold: 3  # regras quebradas

